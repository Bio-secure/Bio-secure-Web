<!DOCTYPE html>
<html>
<head>
    <title>Iris Identification Project</title>
    <style>
        .row {
            display: flex;
        }
        .column {
            flex: 33.33%;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Iris Identification :: BMT-20 Scanner</h1>

    <p>
        <button onclick="capture();">Capture</button>
        <h1 id="txt_L"></h1>
        <h1 id="txt_R"></h1>
    </p>

    <div class="row">
        <div class="column">
            Right Eye: <input type="checkbox" id="Check_R">
            <img id="reye" src="" alt="" style="width:100%">
        </div>

        <div class="column">
            Left Eye: <input type="checkbox" id="Check_L">
            <img id="leye" src="" alt="" style="width:100%">
        </div>
    </div>

    <script type="text/javascript">
        var wsUri = "ws://127.0.0.1:5000/Iris";
        var websocket = null;
        var leye = document.getElementById("leye");
        var reye = document.getElementById("reye");

        window.onload = function () {
            initWebSocket();
            document.getElementById("Check_L").checked = true;
            document.getElementById("Check_R").checked = true;
        };

        function initWebSocket() {
            try {
                if (typeof MozWebSocket == 'function')
                    WebSocket = MozWebSocket;

                if (websocket && websocket.readyState == 1)
                    websocket.close();

                websocket = new WebSocket(wsUri);

                websocket.onopen = function (evt) {
                    console.log("CONNECTED");
                    websocket.send("connect");
                };

                websocket.onclose = function (evt) {
                    console.log("DISCONNECTED");
                };

                websocket.onmessage = function (evt) {
                    console.log("Raw message:", evt.data);

                    // Split the incoming message by comma
                    var parts = evt.data.split(",");
                    var msg_type = parts[0];  // First element is the message type

                    console.log("Message received:", msg_type);

                    if (msg_type === "irises") {
                        var l_iris = "data:image/bmp;base64," + parts[1];
                        var r_iris = "data:image/bmp;base64," + parts[2];
                        leye.src = l_iris;
                        reye.src = r_iris;

                    } else if (msg_type === "irise_L") {
                        var l_iris = "data:image/bmp;base64," + parts[1];
                        leye.src = l_iris;
                        reye.src = "";

                    } else if (msg_type === "irise_R") {
                        var r_iris = "data:image/bmp;base64," + parts[1];
                        leye.src = "";
                        reye.src = r_iris;

                    } else {
                        console.log("Unknown message:", evt.data);
                    }
                };

                websocket.onerror = function (evt) {
                    console.log("ERROR:", evt);
                };
            } catch (exception) {
                console.log("EXCEPTION:", exception);
            }
        }

        function capture() {
            leye.src = "";
            reye.src = "";
            var L = document.getElementById("Check_L").checked;
            var R = document.getElementById("Check_R").checked;

            if (websocket != null) {
                if (R && L) {
                    websocket.send("BOTH_EYES");
                    console.log(">>> Sent: BOTH_EYES");
                } else if (L && !R) {
                    websocket.send("LEFT_EYE");
                    console.log(">>> Sent: LEFT_EYE");
                } else if (R && !L) {
                    websocket.send("RIGHT_EYE");
                    console.log(">>> Sent: RIGHT_EYE");
                }
            }
        }

        function stopCapture() {
            if (websocket)
                websocket.send("stop");
        }

        function stopWebSocket() {
            if (websocket) {
                websocket.send("close");
                websocket.close();
            }
        }
    </script>
</body>
</html>
